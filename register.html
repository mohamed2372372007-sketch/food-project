    <div class="register-container">
      <h1 class="h2">Register</h1>
      <p>If you didn't have an account please fill in these boxes</p>
      <form>
        <label for="username">Username</label>
        <br />
        <input
          type="text"
          id="username"
          name="username"
          placeholder="Enter an username"
          required
        />
        <br />
        <label for="email">Email</label>
        <br />
        <input
          type="email"
          id="email-reg"
          name="email"
          placeholder="Enter an email"
          required
        />
        <br />
        <label for="password">Password</label>
        <br />
        <input
          type="password"
          id="password-reg"
          name="password"
          placeholder="Enter a complex password"
          required
        />
        <br />
        <label for="address">Address<small>(opptinal)</small></label>
        <br />
        <input
          type="text"
          id="address"
          name="address"
          placeholder="Enter your address if you need"
        />
        <br />
        <button type="submit" id="submit-reg">Submit</button>
      </form>
    </div>
    <script src="for all.js"></script>
    <script src="register.js"></script>
